<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatAI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>ChatAI</h1>
      <div class="header-actions">
        <button class="icon-btn" id="settings-toggle" title="Configuracoes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path>
          </svg>
        </button>
        <button class="icon-btn" id="clear-btn" title="Limpar conversa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
          </svg>
        </button>
        <button class="icon-btn" id="theme-btn" title="Alternar tema">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
          </svg>
        </button>
      </div>
    </header>

    <div id="settings-panel">
      <form id="settings-form">
        <div class="form-group full">
          <label for="endpoint">Endpoint ID</label>
          <input type="text" name="endpoint" id="endpoint" placeholder="ex: abc123" required>
        </div>
        <div class="form-group">
          <label for="temperature">Temperatura</label>
          <input type="number" name="temperature" id="temperature" min="0" max="2" step="0.1" value="0.7">
        </div>
        <div class="form-group">
          <label for="max_tokens">Max tokens</label>
          <input type="number" name="max_tokens" id="max_tokens" min="1" max="8192" step="1" value="1024">
        </div>
        <button type="submit">Salvar</button>
      </form>
    </div>

    <div id="chat-container"></div>

    <div id="typing-indicator" class="hidden">
      <div class="typing-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <div id="input-area">
      <textarea placeholder="Digite sua mensagem..." rows="1"></textarea>
      <button id="send-btn" title="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
