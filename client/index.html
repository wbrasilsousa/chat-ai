<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wbrasil.dev - ChatAI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app initial">
    <header>
      <h1>ChatAI</h1>
      <div class="header-actions">
        <button class="icon-btn" id="clear-btn" title="Limpar conversa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
          </svg>
        </button>
      </div>
    </header>

    <div id="welcome">
      <h2>ChatAI</h2>
      <p>Seu assistente com inteligência artificial</p>
    </div>

    <div id="chat-container"></div>

    <div id="input-area">
      <textarea placeholder="Digite sua mensagem..." rows="1"></textarea>
      <button id="send-btn" title="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

    <div id="disclaimer">
      Este é um projeto com fins de estudo. Utiliza o modelo <strong>huihui-ai/huihui-qwen3-1.7b-abliterated-v2</strong> (não-censurado). O servidor pode ter um cold start de até 2 minutos na primeira requisição, e recicla a cada 30 segundos de inatividade.
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
